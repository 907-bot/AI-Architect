version: '3.8'

services:
  # =====================================================
  # BACKEND - FastAPI + LangGraph
  # =====================================================
  
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-architect-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - CLOUDFLARE_R2_ENDPOINT=${CLOUDFLARE_R2_ENDPOINT}
      - CLOUDFLARE_R2_ACCESS_KEY=${CLOUDFLARE_R2_ACCESS_KEY}
      - CLOUDFLARE_R2_SECRET_KEY=${CLOUDFLARE_R2_SECRET_KEY}
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=http://localhost:3000,https://ai-architect.vercel.app
    depends_on:
      - redis
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ai-architect
    restart: unless-stopped


  # =====================================================
  # FRONTEND - Next.js
  # =====================================================
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-architect-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NODE_ENV=development
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - ai-architect
    restart: unless-stopped


  # =====================================================
  # REDIS - Cache & Queue
  # =====================================================
  
  redis:
    image: redis:7-alpine
    container_name: ai-architect-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ai-architect
    restart: unless-stopped


  # =====================================================
  # MCP SERVERS (Optional - for local testing)
  # =====================================================
  
  # geometry-mcp:
  #   build:
  #     context: ./backend/mcp_servers
  #     dockerfile: Dockerfile.mcp
  #   container_name: geometry-mcp-server
  #   environment:
  #     - MCP_SERVER=geometry_mcp
  #   networks:
  #     - ai-architect
  #   restart: unless-stopped


volumes:
  redis_data:


networks:
  ai-architect:
    driver: bridge
